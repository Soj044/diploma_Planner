services:
  postgres:
    image: postgres:16-alpine
    container_name: workestrator-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  core-service:
    build:
      context: .
      dockerfile: services/core-service/Dockerfile
    container_name: workestrator-core
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  planner-service:
    build:
      context: .
      dockerfile: services/planner-service/Dockerfile
    container_name: workestrator-planner
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    command: >
      sh -c "uvicorn app.main:app --host $${PLANNER_HOST:-0.0.0.0} --port $${PLANNER_PORT:-8001}"

volumes:
  postgres_data:
