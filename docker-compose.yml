services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: workestrator-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 10

  core-service:
    build:
      context: .
      dockerfile: services/core-service/Dockerfile
    container_name: workestrator-core
    env_file:
      - .env
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token}
      PLANNER_SERVICE_URL: http://planner-service:8001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py safe_migrate &&
             python manage.py runserver 0.0.0.0:8000"

  planner-service:
    build:
      context: .
      dockerfile: services/planner-service/Dockerfile
    container_name: workestrator-planner
    env_file:
      - .env
    environment:
      CORE_SERVICE_URL: http://core-service:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    command: >
      sh -c "uvicorn app.main:app --host $${PLANNER_HOST:-0.0.0.0} --port $${PLANNER_PORT:-8001}"

  ai-layer:
    build:
      context: .
      dockerfile: services/ai-layer/Dockerfile
    container_name: workestrator-ai-layer
    env_file:
      - .env
    environment:
      CORE_SERVICE_URL: http://core-service:8000
      PLANNER_SERVICE_URL: http://planner-service:8001
      AI_LAYER_URL: http://ai-layer:8002
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:4b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      AI_VECTOR_DIM: ${AI_VECTOR_DIM:-1024}
      AI_TOP_K: ${AI_TOP_K:-5}
      AI_SYNC_STALE_SECONDS: ${AI_SYNC_STALE_SECONDS:-300}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token}
    depends_on:
      postgres:
        condition: service_healthy
      core-service:
        condition: service_started
      planner-service:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8002:8002"
    command: >
      sh -c "uvicorn app.main:app --host $${AI_LAYER_HOST:-0.0.0.0} --port $${AI_LAYER_PORT:-8002}"

  ollama:
    image: ollama/ollama:latest
    container_name: workestrator-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend-app:
    build:
      context: .
      dockerfile: frontend-app/Dockerfile
    container_name: workestrator-frontend
    depends_on:
      core-service:
        condition: service_started
      planner-service:
        condition: service_started
      ai-layer:
        condition: service_started
    environment:
      VITE_APP_TITLE: Workestrator Frontend
      VITE_CORE_SERVICE_PROXY_TARGET: http://core-service:8000
      VITE_PLANNER_SERVICE_PROXY_TARGET: http://planner-service:8001
      VITE_AI_SERVICE_PROXY_TARGET: http://ai-layer:8002
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-app:/app/frontend-app
      - frontend_node_modules:/app/frontend-app/node_modules
    command: >
      sh -c "npm install &&
             npm run dev"

volumes:
  postgres_data:
  frontend_node_modules:
  ollama_data:
